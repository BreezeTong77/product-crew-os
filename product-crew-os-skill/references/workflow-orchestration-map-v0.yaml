schema_version: "0.1"
map_kind: "workflow_orchestration_map"
updated_at: "2026-07-10"
claim_boundary:
  overall_status: "flow_01_complete"
  full_macro_flows_complete: 1
  macro_flows_total: 10
  purpose: "Define the macro-flow orchestration counter and mark only replayable full macro-flow Golden Cases as complete."
  allowed_claim: "flow_01 机会发现已具备完整主流程 Golden Case；当前 10 大主流程完整编排为 1/10。"
  must_not_claim:
    - "10 大主流程已完整跑通"
    - "44 个 SOP runtime smoke 等于完整主流程编排"
    - "flow_01 完整 Golden Case 等于 PM 全流程完成"
    - "synthetic Golden Case 等于真实业务线上验证"
completion_definition:
  required_for_full_macro_flow:
    - flow_map_defined
    - state_machine_path_defined
    - artifact_chain_defined
    - primary_skill_assertions_defined
    - required_and_triggered_roles_defined
    - invocation_ledger_assertions_defined
    - gate_evidence_defined
    - golden_case_replayable
  complete_status_rule: "A macro flow is complete only when implementation_status is complete, completion_qualifies_as_full_macro_flow is true, and golden_case.status is complete."
skill_status_values:
  - primary_hit
  - fallback_hit
  - template_degraded
  - missing
  - runtime_blocked
runtime_status_values:
  - not_started
  - partial
  - complete
  - runtime_blocked
macro_flows:
  - flow_id: "flow_01_opportunity_discovery"
    title: "机会发现"
    user_visible_goal: "判断一个方向是否值得进入低成本验证。"
    implementation_status: "complete"
    completion_qualifies_as_full_macro_flow: true
    current_evidence:
      sop_router_status: "implemented"
      runtime_smoke_status: "tested"
      full_state_machine_status: "complete"
      golden_case_status: "complete"
    stages:
      - { stage_id: "project_intake", sop_ids: ["00"], required_artifacts: ["project-card.md"] }
      - { stage_id: "request_triage", sop_ids: ["01"], required_artifacts: ["triage-note.md"] }
      - { stage_id: "stakeholder_map", sop_ids: ["02"], required_artifacts: ["stakeholder-map.md"] }
      - { stage_id: "business_context", sop_ids: ["03"], required_artifacts: ["business-context.md"] }
      - { stage_id: "existing_workflow_mapping", sop_ids: ["04"], required_artifacts: ["current-state-workflow.md"] }
      - { stage_id: "evidence_inventory", sop_ids: ["05"], required_artifacts: ["evidence-inventory.md", "opportunity-gate-summary.md"] }
    artifacts:
      - "project-card.md"
      - "triage-note.md"
      - "stakeholder-map.md"
      - "business-context.md"
      - "current-state-workflow.md"
      - "evidence-inventory.md"
      - "opportunity-gate-summary.md"
    required_roles: ["Coach"]
    triggered_roles: ["Biz", "Research", "Data", "Customer", "CS"]
    gate:
      status_values: ["pass", "conditional_pass", "block", "rollback"]
      pass_boundary: "只能代表进入低成本验证，不代表需求成立、PRD 通过、MVP 批准或上线批准。"
    golden_case:
      status: "complete"
      existing_files:
        - "tests/golden-cases/flow-01-opportunity-discovery-pass.yaml"
        - "tests/golden-cases/flow-01-opportunity-discovery-full.yaml"
      missing_for_complete: []
