schema_version: "0.1"
purpose: "Runtime thresholds and human-reviewed routing calibration controls."

thresholds:
  rag_route_min_score: 0.55
  rag_route_min_margin: 0.04
  lexical_route_min_score: 0.25
  lexical_route_min_margin: 0.06
  domain_rag_min_score: 0.50

review_policy:
  same_route_correction_threshold: 3
  auto_apply: false
  rule: "Bad Cases generate a human review suggestion only. No Runtime or Agent may change thresholds automatically."

adjustable_controls:
  - rag_route_min_score
  - rag_route_min_margin
  - lexical_route_min_score
  - lexical_route_min_margin
