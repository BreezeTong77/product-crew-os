scenario_id: "project_asset_pack_persistence"
user_input: "我们做完 PRD 内审了，把项目推进过程、评审结论和下一步沉淀下来，后面方便查询，也可以导出给 Obsidian 看。"
expected:
  product_crew_os_applies: true
  stage_id_any_of:
    - "pm_self_review"
    - "internal_product_review"
    - "formal_requirements_review"
  required_artifact: "Project Asset Pack"
  required_files:
    - "project-state.json"
    - "project-home.md"
    - "artifact-index.yaml"
    - "timeline.md"
    - "decision-log.md"
    - "review-items.yaml"
    - "risk-log.md"
    - "next-actions.md"
    - "source-ledger.md"
    - "event-log.jsonl"
    - "export-manifest.yaml"
  review_closed_updates:
    - "timeline.md"
    - "decision-log.md"
    - "review-items.yaml"
    - "next-actions.md"
    - "export-manifest.yaml"
  must_include:
    - "Project Workspace remains source of truth"
    - "Markdown project package"
    - "artifact index"
    - "timeline"
    - "decision log"
    - "review items"
    - "risk log"
    - "next actions"
    - "source ledger"
    - "event log"
    - "checkpoints"
    - "Obsidian-compatible export is optional"
  must_not:
    - "store raw chat log by default"
    - "treat Obsidian as required"
    - "read full Obsidian vault into context"
    - "mix user preference memory into project package"
