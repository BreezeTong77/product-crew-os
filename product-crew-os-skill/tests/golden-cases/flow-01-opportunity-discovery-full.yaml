      stage_id: project_intake
    - event_type: artifact_created
      artifact_id: project-card-v0
    - event_type: review_opened
      review_session_id: REVIEW-FLOW-01-FULL
    - event_type: gate_decided
      gate_id: GATE-FLOW-01-OPPORTUNITY-DISCOVERY

material_use_policy:
  synthetic_case: true
  contains_real_user_material: false
  contains_real_customer_material: false
  contains_real_colleague_material: false
  requires_separate_consent_for:
    - long_term_memory
    - role_style_training
    - template_reuse
    - public_rule_package
    - public_example
    - product_marketing
  deidentification_required_before_public_use: true

anti_overclaim_assertions:
  must_not_claim:
    - "flow_01 完整 Golden Case 等于 10 大主流程全部完成"
    - "opportunity discovery conditional_pass 等于 PRD 通过"
    - "synthetic_fixture 等于真实线上子 Agent 调用"
    - "primary_hit 等于外部用户业务验证成功"
  allowed_claim:
    - "flow_01_opportunity_discovery 已具备完整主流程 Golden Case"
    - "10 大主流程完整编排计数可从 0/10 更新为 1/10"
    - "其余 9 个主流程仍未完成完整编排"

coverage_delta:
  macro_flow_id: flow_01_opportunity_discovery
  counter_name: macro_flow_orchestration_complete_count
  before: "0/10"
  delta: "+1"
  after: "1/10"
  qualifying_flow: flow_01_opportunity_discovery
  remaining_macro_flows: 9
  qualifying_rule: "implementation_status == complete AND completion_qualifies_as_full_macro_flow == true AND golden_case.status == complete"
  flow_status_after_case: complete
  full_macro_flows_complete_after_case: 1
  macro_flows_total: 10
  golden_case_files_after_case: 2
  opportunity_discovery_stage_ids_covered:
    - project_intake
    - request_triage
    - stakeholder_map
    - business_context
    - existing_workflow_mapping
    - evidence_inventory
