measurement_plan:
  metric_contract_status: candidate_validation_metrics_not_data_contract
  sample_min: 10
  metrics:
    - metric_id: target_user_clarity_rate
      numerator: "能说清目标用户和场景的有效样本数"
      denominator: "有效样本总数"
      threshold: ">= 8/10"
      owner_role: Research
      data_source: "访谈/材料标注"
      field_availability: "candidate_fields_defined_no_live_table"
      update_frequency: per_validation_batch
      freshness_requirement: "within current validation batch"
      attribution_window: "same interview or submitted material"
      instrumentation_requirements:
        - respondent_id
        - target_user_named
        - scenario_named
        - evidence_source_ref
      decision_action_if_pass: continue_to_low_cost_validation
      decision_action_if_fail: return_to_project_intake
    - metric_id: pain_and_workaround_rate
      numerator: "同时存在明确痛点和已有 workaround 的有效样本数"
      denominator: "有效样本总数"
      threshold: ">= 6/10"
      owner_role: Research
      data_source: "访谈/现有流程证据"
      field_availability: "candidate_fields_defined_no_live_table"
      update_frequency: per_validation_batch
      freshness_requirement: "within current validation batch"
      attribution_window: "same interview, workflow note, or uploaded evidence source"
      instrumentation_requirements:
        - respondent_id
        - pain_named
        - workaround_named
        - workflow_source_ref
      decision_action_if_pass: continue_to_low_cost_validation
      decision_action_if_fail: reframe_problem
    - metric_id: business_pressure_clarity_rate
      numerator: "能绑定成本、效率、收入、风险或体验压力的机会数"
      denominator: "进入 Gate 的机会数"
      threshold: ">= 1/1"
      owner_role: Biz
      data_source: "business-context artifact"
      field_availability: "artifact_fields_required"
      update_frequency: per_gate_review
      freshness_requirement: "current artifact version"
      attribution_window: "current gate session"
      instrumentation_requirements:
        - opportunity_id
        - pressure_type
        - owner_role
        - artifact_version
      decision_action_if_pass: continue_to_low_cost_validation
      decision_action_if_fail: block_until_business_context
    - metric_id: evidence_gap_named_rate
      numerator: "已标注证据缺口和下一步验证动作的关键假设数"
      denominator: "关键假设总数"
      threshold: "100%"
      owner_role: Data
      data_source: "evidence-inventory artifact"
      field_availability: "artifact_fields_required"
      update_frequency: per_gate_review
      freshness_requirement: "current artifact version"
      attribution_window: "current evidence inventory version"
      instrumentation_requirements:
        - assumption_id
        - evidence_ref
        - confidence
        - missing_evidence
        - next_validation_action
      decision_action_if_pass: continue_to_low_cost_validation
      decision_action_if_fail: conditional_pass_with_evidence_fix

gate_decision_mapping:
  gate_id: GATE-FLOW-01-OPPORTUNITY-DISCOVERY
  gate_result: conditional_pass
  pass_boundary: "进入低成本验证，不进入 PRD/MVP/上线。"
  continue_to_low_cost_validation:
    required:
      - "target_user_clarity_rate >= 8/10"
      - "pain_and_workaround_rate >= 6/10"
      - "business_pressure_clarity_rate >= 1/1"
      - "evidence_gap_named_rate == 100%"
    user_decision_required: true
  block:
    trigger_any:
      - "domain != product_work"
      - "no owner or target user"
      - "no business/user pain evidence and user refuses validation"
  rollback:
    trigger_any:
      - "user corrects domain or stage"
      - "stakeholder authority is wrong"
      - "evidence source is invalid or not authorized"

negative_paths:
  - path_id: F01-NON-PRODUCT-EXIT
    trigger: "domain_intent_gate.domain != product_work"
    expected_state_path: [domain_gate, done]
    expected_result: exit_product_crew_os
    must_not_call_skills: true
    must_not_call_agents: true
  - path_id: F01-EVIDENCE-GAP-BLOCK
    trigger: "evidence_inventory has no source and user refuses validation"
    expected_state_path: [evidence_checking, gate_checking, memory_writing, done]
    expected_result: block
    required_artifact_update: open-questions.md
  - path_id: F01-USER-STAGE-CORRECTION
    trigger: "user says this is already PRD review, not opportunity discovery"
    expected_state_path: [user_deciding, stage_matched, sop_composing]
    expected_result: rollback_to_corrected_stage
    required_artifact_update: decision-log.md

project_asset_pack:
  required_files:
    - project-home.md
    - artifact-index.yaml
    - timeline.md
    - decision-log.md
    - review-items.yaml
    - conflict-matrix.md
    - open-questions.md
    - artifact-diff.md
    - risk-log.md
    - next-actions.md
    - source-ledger.md
    - event-log.jsonl
    - agent-memory/README.md
    - checkpoints/README.md
    - export-manifest.yaml
  event_log_must_include:
