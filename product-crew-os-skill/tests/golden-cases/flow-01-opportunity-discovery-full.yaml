case_id: flow_01_opportunity_discovery_full
fixture_type: synthetic_case
real_runtime_claim: false
main_flow_id: flow_01_opportunity_discovery
main_flow_name: 机会发现完整主流程
coverage_level: full_macro_flow_happy_path_with_negative_paths
result_boundary: "只证明机会发现主流程可从想法接入走到低成本验证 Gate，不代表需求成立、PRD 通过、MVP 批准、合规认证或上线批准。"

frontstage_policy:
  visible_fields:
    - current_judgment
    - current_stage
    - deliverables
    - non_promises
    - key_risks
    - decision_options
    - correction_entry
    - next_action
  hidden_by_default:
    - sop_ids
    - skill_calls
    - gate_ids
    - role_keys
    - runtime_trace
    - invocation_ledger
    - raw_review_records
    - persona_source_ref

state_machine:
  initial_state: idle
  final_state: done
  expected_path:
    - domain_gate
    - intent_routing
    - stage_matched
    - project_context_loading
    - sop_composing
    - skill_routing
    - artifact_drafting
    - evidence_checking
    - review_open
    - context_packet_building
    - agent_reviewing
    - review_summarizing
    - user_deciding
    - gate_checking
    - memory_writing
    - asset_pack_exporting
    - done
  transition_assertions:
    - from: domain_gate
      to: intent_routing
      condition: "product_crew_os_applies == true"
    - from: evidence_checking
      to: review_open
      condition: "business target, evidence uncertainty, workflow adoption, and metric baseline triggers are present"
    - from: user_deciding
      to: gate_checking
      condition: "user decision is explicit: continue_to_low_cost_validation"
    - from: gate_checking
      to: memory_writing
      condition: "gate_result in pass / conditional_pass / block / rollback"

domain_intent_gate:
  domain: product_work
  intent: opportunity_discovery
  confidence: 0.93
  user_input_fixture: "我有一个新产品想法，想判断它值不值得继续做。"
  candidates:
    - canonical_stage_id: project_intake
      confidence: 0.31
    - canonical_stage_id: request_triage
      confidence: 0.22
    - canonical_stage_id: business_context
      confidence: 0.19
    - canonical_stage_id: evidence_inventory
      confidence: 0.16
  user_correction_needed: false

sop_composition:
  composition_id: COMP-FLOW-01-FULL
  mode: standard
  selected_sops:
    - sop_id: "00"
      canonical_stage_id: project_intake
      output_artifact_id: project-card-v0
      gate: "project has owner, target user, rough objective"
    - sop_id: "01"
      canonical_stage_id: request_triage
      output_artifact_id: triage-note-v0
      gate: "user knows current stage and next artifact"
    - sop_id: "02"
      canonical_stage_id: stakeholder_map
      output_artifact_id: stakeholder-map-v0
      gate: "decision makers and reviewers are named"
    - sop_id: "03"
      canonical_stage_id: business_context
      output_artifact_id: business-context-v0
      gate: "business problem and success pressure are clear"
    - sop_id: "04"
      canonical_stage_id: existing_workflow_mapping
      output_artifact_id: current-state-workflow-v0
      gate: "current actors, handoffs, pain points are visible"
    - sop_id: "05"
      canonical_stage_id: evidence_inventory
      output_artifact_id: evidence-inventory-v0
      gate: "claims are separated from evidence gaps"
  not_selected:
    - sop_id: "08"
      canonical_stage_id: research_plan
      reason: "属于用户研究主流程，机会发现 Gate 通过后才进入。"
    - sop_id: "17"
      canonical_stage_id: mvp_scope
      reason: "未完成机会发现 Gate，不能提前收 MVP 范围。"
    - sop_id: "26"
      canonical_stage_id: prd_outline
      reason: "机会尚未被验证，不能直接进入 PRD。"

artifact_chain:
  workspace_kind: project_workspace
  artifacts:
    - artifact_id: project-card-v0
      file: artifacts/project-card.md
      stage_id: project_intake
      required_sections: [background, rough_goal, target_user, owner, known_files]
    - artifact_id: triage-note-v0
      file: artifacts/triage-note.md
      stage_id: request_triage
      required_sections: [domain_decision, current_stage, next_artifact, exit_if_non_product]
    - artifact_id: stakeholder-map-v0
      file: artifacts/stakeholder-map.md
      stage_id: stakeholder_map
      required_sections: [decision_makers, reviewers, authority, open_alignment_risks]
    - artifact_id: business-context-v0
      file: artifacts/business-context.md
      stage_id: business_context
      required_sections: [business_goal, pressure, expected_outcome, non_goals]
    - artifact_id: current-state-workflow-v0
      file: artifacts/current-state-workflow.md
      stage_id: existing_workflow_mapping
      required_sections: [actors, handoffs, current_tools, pain_points, workaround]
    - artifact_id: evidence-inventory-v0
      file: artifacts/evidence-inventory.md
      stage_id: evidence_inventory
      required_sections: [claims, evidence_refs, confidence, missing_evidence, next_validation]
    - artifact_id: opportunity-gate-summary-v0
      file: artifacts/opportunity-gate-summary.md
      stage_id: evidence_inventory
      required_sections: [gate_result, user_decision, pass_boundary, next_flow]

