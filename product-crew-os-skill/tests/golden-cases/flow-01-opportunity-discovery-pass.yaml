measurement_plan:
  sample_min: 10
  metrics:
    - metric_id: pain_frequency_rate
      numerator: "每周遇到 2 次以上行动项漏跟的受访者数"
      denominator: "有效受访者总数"
      threshold: ">= 6/10"
      data_source: "用户访谈"
      owner_role: Research
      decision_action_if_pass: continue_to_validation
      decision_action_if_fail: pause_or_stop
    - metric_id: workaround_rate
      numerator: "存在 workaround 的受访者数"
      denominator: "有效受访者总数"
      threshold: ">= 5/10"
      data_source: "用户访谈"
      owner_role: Research
      decision_action_if_pass: continue_to_validation
      decision_action_if_fail: stop_or_reframe_problem
    - metric_id: material_acceptance_rate
      numerator: "愿意提供可接受材料的受访者数"
      denominator: "有效受访者总数"
      threshold: ">= 4/10"
      data_source: "隐私接受度问题"
      owner_role: Research
      decision_action_if_pass: continue_to_validation
      decision_action_if_fail: narrow_scope
    - metric_id: business_signal_rate
      numerator: "有付费/预算/决策/迁移信号的受访者数"
      denominator: "有效受访者总数"
      threshold: ">= 3/10"
      data_source: "商业信号访谈"
      owner_role: Biz
      decision_action_if_pass: continue_to_validation
      decision_action_if_fail: pause_for_competitor_scan

gate_decision_mapping:
  continue_to_validation:
    required:
      - "pain_frequency_rate >= 6/10"
      - "workaround_rate >= 5/10"
      - "material_acceptance_rate >= 4/10"
    note: "仅代表继续低成本验证，不代表进入 MVP。"
  narrow_scope:
    trigger_any:
      - "material_acceptance_rate < 4/10 but transcript-only acceptance is positive"
  pause_for_competitor_scan:
    trigger_any:
      - "existing_tool_gap_rate < 4/10"
  stop:
    trigger_any:
      - "users only need summaries, not task follow-up"

material_use_policy:
  synthetic_case: true
  contains_real_user_material: false
  contains_real_customer_material: false
  contains_real_colleague_material: false
  requires_separate_consent_for:
    - long_term_memory
    - role_style_training
    - template_reuse
    - public_rule_package
    - public_example
    - product_marketing
  deidentification_required_before_public_use: true

privacy_public_boundary:
  gate_disclaimer: "Gate/Formal Gate 仅代表流程证据、角色评审与用户决策检查，不构成法务合规认证、律师审查、上线批准或对外合规背书。"
  ordinary_user_frontstage_must_not_show:
    - runtime_trace
    - invocation_ledger
    - role_key
    - raw_review_records
    - private_material

