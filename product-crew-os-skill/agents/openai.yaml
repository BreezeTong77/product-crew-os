interface:
  display_name: "Product Crew OS"
  short_description: "AI product coach with a configurable PM crew"
  default_prompt: "Use $product-crew-os to guide my product project, call the right stakeholder only when needed, and tell me the next artifact to produce."

policy:
  allow_implicit_invocation: true
  implicit_invocation_write_mode: "project_runtime_after_project_init"
  project_memory_write_mode: "automatic_for_product_work_after_workspace_is_initialized"
  user_preference_write_requires_explicit_user_signal: true
  product_rule_write_requires_explicit_maintainer_action: true
  real_team_material_write_requires_explicit_user_consent: true
