schema_version: "0.1"
integration: coze
product: Product Crew OS
description: "Coze Bot + Workflow + Database blueprint with a Python LangGraph Product Crew OS Runtime Bridge."

deployment_assets:
  runtime_bridge_entrypoint: "runtime/pco_coze_bridge.py"
  openapi_plugin_contract: "integrations/coze/runtime-plugin-openapi.yaml"
  delegate_signer_openapi_contract: "integrations/coze/delegate-signer-openapi.yaml"
  sub_bot_binding_template: "integrations/coze/sub-bot-bindings.example.yaml"
  coze_database_schema: "integrations/coze/database-schema.yaml"
  workflow_node_map: "integrations/coze/workflow-node-map.yaml"
  required_environment:
    - "PCO_RUNTIME_TOKEN"
    - "PCO_LANGGRAPH_DELEGATE_SECRET"
    - "PCO_SKILL_RECEIPT_SECRET"
    - "PCO_OLLAMA_URL"
    - "PCO_SKILL_MODEL"
    - "PCO_EMBEDDING_PROVIDER=local_open_source_bge_small_zh"
    - "PCO_BGE_MODEL"
    - "PCO_SUBAGENT_BINDINGS_PATH"
    - "PCO_DELEGATE_SIGNER_URL"
    - "PCO_DELEGATE_SIGNER_TOKEN"
  source_of_truth: "LangGraph checkpoint + Runtime SQLite + Project Workspace; Coze Database is an inspectable workflow mirror."

entry_bot:
  key: CoachBot
  display_name: "甜心教练-董董"
  user_visible: true
  responsibilities:
    - domain_gate
    - stage_router
    - sop_router
    - skill_router
    - review_router
    - stage_gate
    - next_action_summary

capability_handshake:
  required_for_minimum_runtime:
    route_trace_writer: connected
    sop_router: connected
    skill_router: connected
    project_database: connected
    artifact_writer: connected
  required_for_standard_sop:
    real_embedding_provider: connected
    vector_index: connected
    subagent_delegate: connected
    invocation_ledger: connected
    raw_review_writer: connected
  missing_capability_status: runtime_not_connected
  gate_when_missing: blocked_runtime_preflight

sub_bots:
  - key: Biz
    display_name: "业务负责人"
    user_visible: false
  - key: Tech
    display_name: "技术负责人"
    user_visible: false
  - key: Design
    display_name: "产品设计"
    user_visible: false
  - key: Research
    display_name: "用户调研"
    user_visible: false
  - key: Data
    display_name: "数据负责人"
    user_visible: false
  - key: QA
    display_name: "测试负责人"
    user_visible: false
  - key: CS
    display_name: "客户成功"
    user_visible: false
  - key: Customer
    display_name: "客户代表"
    user_visible: false
  - key: Legal
    display_name: "法务合规"
    user_visible: false
  - key: Ops
    display_name: "运营培训"
    user_visible: false

workflow_nodes:
  - key: domain_gate
    input: [user_message]
    output: [domain_intent]
  - key: project_state_loader
    input: [project_id]
    output: [project_state, latest_artifacts, open_review_items]
  - key: stage_router
    input: [user_message, project_state]
    output: [stage_id, macro_stage, route_confidence, candidate_routes, retrieval_mode, real_embedding_performed, source_refs]
  - key: route_trace_writer
    input: [stage_id, macro_stage, route_confidence, candidate_routes, retrieval_mode, real_embedding_performed, source_refs]
    output: [route_decision_id, stage_route_decision_path]
  - key: route_feedback_writer
    input: [project_id, route_decision_id, user_confirmed_or_corrected, corrected_stage_id, reason]
    output: [feedback_id, bad_case_id]
    invariant: "Only an explicit user confirmation or correction can enter SOP accuracy. A correction never auto-changes router thresholds."
  - key: embedding_recall
    input: [user_message, prompt_eval_44_sop_index]
    output: [top_k_sop_candidates, real_embedding_performed, embedding_provider, embedding_model, source_refs]
  - key: sop_loader
    input: [stage_id]
    output: [sop_id, required_input, required_artifacts, required_roles, stage_gate]
  - key: skill_router
    input: [stage_id, sop_id, user_skill_overlay]
    output: [primary_skill, fallback_skill, selected_skill]
  - key: skill_execution
    input: [selected_skill, user_message, project_state, stage_id, sop_id, input_artifact_refs, skill_input]
    output: [draft_output, source_refs, graph_issued_skill_receipt]
    invariant: "LangGraph is the sole Skill executor and receipt issuer. A Skill may keep its own professional workflow, but may_change_stage, may_decide_gate, may_write_project_memory, and may_call_agents are always false."
    execution_rule: "Call runtimeRecordTurn with bounded skill_input only. Do not send skill_execution, execution_id, or a claimed success result. LangGraph executes primary/fallback Skill, stores raw output, then signs the receipt. Missing deployment or MCP authorization blocks the Stage Gate."
  - key: artifact_writer
    input: [draft_output, stage_id, sop_id]
    output: [artifact_id, artifact_version, artifact_path]
  - key: review_router
    input: [stage_id, artifact_id, stage_gate]
    output: [required_roles]
  - key: review_session_writer
    input: [artifact_id, artifact_version, stage_id, required_roles]
    output: [review_session_id, locked_artifact_version]
  - key: context_packet_builder
    input: [review_session_id, role_key, stage_id, artifact_id, decisions, review_items, role_memory]
    output: [context_packet_id, context_packet]
  - key: sub_bot_invoker
    input: [role_key, context_packet]
    output: [runtime_agent_id, coze_invocation_id, runtime_nickname, raw_review, conclusion, review_items]
    callback_operation_id: runtimeResumeReview
    callback_invariant: "The Call Bot result must carry an approved runtime_agent_id and coze_invocation_id, then pass through Delegate Signer before runtimeResumeReview; same-thread roleplay is invalid for a gate."
    must_not: ["mark same-thread roleplay as real_invocation_performed"]
  - key: delegate_callback_signer
    input: [review_session_id, role_key, runtime_agent_id, coze_invocation_id, context_packet_id, context_packet_quality, persona_injection_status, raw_review]
    output: [attested_callback, delegate_proof]
    operation_id: delegateSignerAttestReview
    invariant: "Signer checks the private role binding and signs the full callback; the HMAC secret never enters a Bot Prompt."
  - key: runtime_preflight
    input: [route_decision_id, real_embedding_performed, selected_skill, required_roles, agent_invocations]
    output: [preflight_status, blocking_reason, gate_status]
  - key: raw_review_record_writer
    input: [review_session_id, role_key, invocation_id, context_packet_id, review_output]
    output: [raw_review_record_id, record_path]
  - key: review_item_and_conflict_collector
    input: [review_session_id, raw_review_record_id]
    output: [review_items, conflict_matrix, open_questions, memory_candidates]
  - key: user_decision_parser
    input: [user_message, review_items, conflict_matrix, open_questions]
    output: [accepted_items, rejected_items, deferred_items, needs_confirmation]
  - key: artifact_revision_and_diff_writer
    input: [accepted_items, artifact_id]
    output: [new_artifact_version, artifact_diff]
  - key: re_review_router
    input: [artifact_diff, affected_roles]
    output: [re_review_roles]
  - key: project_memory_writer
    input: [artifact_id, review_session_id, review_items, user_decisions, memory_candidates, gate_status]
    output: [database_rows, event_log, project_files]
  - key: operational_metrics_writer
    input: [project_id]
    output: [sop_confirmed_accuracy, skill_true_execution_rate, subagent_callback_completion_rate, bad_cases, calibration_review_queue]
    invariant: "Metrics come from Runtime facts and are written to the project vault; Bot prose must not fabricate them."
  - key: obsidian_exporter
    input: [project_id]
    output: [obsidian_vault_path]
  - key: next_action_composer
    input: [gate_status, next_stage, blockers]
    output: [visible_response]

runtime_actions:
  runtime_bootstrap_product_rule_rag: rag-bootstrap
  runtime_capability_handshake: capability-handshake
  runtime_init_project: init-project
  runtime_route_intent: route-intent
  runtime_record_turn: record-turn
  runtime_save_artifact: record-turn.artifact_writer
  runtime_open_review_session: record-turn.review_interrupt
  runtime_build_context_packet: record-turn.context_packet_builder
  runtime_record_invocation: resume.review_callback
  runtime_write_raw_review_record: resume.review_callback
  runtime_write_review_item: resume.review_summary
  runtime_write_agent_memory: export_project_assets
  runtime_export_obsidian: export-obsidian
  runtime_prepare_external_review: record-turn.review_interrupt
  runtime_finalize_stage_gate: resume.user_stage_decision
  runtime_rag_ingest: rag-ingest
  runtime_rag_retrieve: rag-retrieve
  runtime_operational_metrics: operational-metrics
  runtime_record_route_feedback: record-route-feedback
  runtime_list_bad_cases: list-bad-cases

plugin_operations:
  capability_handshake: runtimeCapabilityHandshake
  bootstrap_product_rule_rag: runtimeBootstrapProductRuleRag
  project_init: runtimeInitProject
  route_intent: runtimeRouteIntent
  record_turn: runtimeRecordTurn
  record_sub_bot_callback: runtimeResumeReview
  attest_sub_bot_callback: delegateSignerAttestReview
  record_review_decision: runtimeResumeUserDecision
  finalize_stage_gate: runtimeFinalizeStageGate
  export_obsidian: runtimeExportObsidian
  rag_ingest: runtimeRagIngest
  rag_retrieve: runtimeRagRetrieve
  operational_metrics: runtimeOperationalMetrics
  record_route_feedback: runtimeRecordRouteFeedback
  list_bad_cases: runtimeListBadCases

database_tables:
  - projects
  - stages
  - sop_runs
  - skill_runs
  - artifacts
  - artifact_versions
  - review_sessions
  - raw_review_records
  - decisions
  - review_items
  - risks
  - next_actions
  - sources
  - agent_personas
  - agent_memories
  - context_packets
  - agent_invocations
  - memory_deltas
  - events
  - routing_feedback
  - operational_metrics
  - bad_cases
  - fts_documents

fallback_policy:
  if_real_embedding_unavailable:
    action: "set runtime_degraded and block standard SOP gate"
    must_not_claim: "real_embedding_performed"
  if_real_sub_bot_unavailable:
    action: "emit simulated role perspective as advice_only"
    required_ledger:
      real_invocation_performed: false
      simulation_label_used: true
      result: invalid_for_gate
  if_database_unavailable:
    action: "write Project Workspace files and append event-log.jsonl"
  if_obsidian_unavailable:
    action: "keep Markdown project package export"
