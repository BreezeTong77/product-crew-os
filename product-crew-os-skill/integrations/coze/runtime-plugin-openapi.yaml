openapi: 3.0.3
info:
  title: Product Crew OS Python LangGraph Bridge
  version: 0.2.2
  description: >-
    Coze must enter the Python LangGraph runtime, not write artifacts, reviews,
    or gates through side channels. Every continuing turn carries the persisted
    route_decision_id and every real review callback carries its HMAC proof.
servers:
  - url: https://REPLACE_WITH_YOUR_PUBLIC_RUNTIME_HOST
security:
  - bearerAuth: []
paths:
  /health:
    get:
      operationId: runtimeHealth
      responses:
        '200': { description: Python LangGraph runtime available }
  /v1/handshake:
    post:
      operationId: runtimeCapabilityHandshake
      responses:
        '200': { description: Runtime capabilities }
  /v1/projects:
    post:
      operationId: runtimeInitProject
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, name]
              properties:
                project_id: { type: string }
                name: { type: string }
      responses:
        '200': { $ref: '#/components/responses/RuntimeResponse' }
  /v1/routes:
    post:
      operationId: runtimeRouteIntent
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, user_input]
              properties:
                project_id: { type: string }
                user_input: { type: string }
      responses:
        '200': { $ref: '#/components/responses/RuntimeResponse' }
  /v1/skills/execute:
    post:
      operationId: runtimeExecuteSkill
      description: Standalone preflight only. It can execute a registered Skill, but its result is gate_valid=false. A Stage Gate accepts only the receipt generated by LangGraph inside runtimeRecordTurn.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [skill_id, input]
              properties:
                skill_id: { type: string }
                input: { type: object, additionalProperties: true }
      responses:
        '200': { $ref: '#/components/responses/RuntimeResponse' }
  /v1/rag/ingest:
    post:
      operationId: runtimeRagIngest
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [documents]
              properties:
                namespace: { type: string, default: pco_rules }
                scope: { type: string, default: product_rule_memory }
                consent_ref: { type: string }
                documents:
                  type: array
                  items: { type: object, additionalProperties: true }
      responses:
        '200': { $ref: '#/components/responses/RuntimeResponse' }
  /v1/rag/bootstrap:
    post:
      operationId: runtimeBootstrapProductRuleRag
      description: Downloads/loads the configured local BGE model as needed and builds the graph-owned 44-SOP product-rule index. Run before the standard-SOP handshake.
      responses:
        '200': { $ref: '#/components/responses/RuntimeResponse' }
  /v1/rag/retrieve:
    post:
      operationId: runtimeRagRetrieve
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [query]
              properties:
                query: { type: string }
                namespace: { type: string, default: pco_rules }
                top_k: { type: integer, default: 3 }
                allowed_scopes: { type: array, items: { type: string } }
                consent_ref: { type: string }
      responses:
        '200': { $ref: '#/components/responses/RuntimeResponse' }
  /v1/turns:
    post:
      operationId: runtimeRecordTurn
      description: >-
        Continues only from a persisted route decision for the same project.
        LangGraph runs the routed Skill itself and issues the only accepted receipt.
        Caller-provided Skill success claims are rejected.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id, user_input, route_decision_id]
              properties:
                project_id: { type: string }
                user_input: { type: string }
                route_decision_id: { type: string }
                thread_id: { type: string }
                require_real_embedding: { type: boolean }
                skill_input:
                  type: object
                  description: Bounded data for the routed Skill, such as assumptions or source references. This is input, not a success receipt.
                  additionalProperties: true
      responses:
        '200': { $ref: '#/components/responses/RuntimeResponse' }
  /v1/reviews/callback:
    post:
      operationId: runtimeResumeReview
      description: Each callback must first pass through the separate Coze Delegate Signer. It must carry a full Context Packet ID, approved runtime_agent_id, real Coze invocation ID, raw review and HMAC delegate_proof.
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [thread_id, callbacks]
              properties:
                thread_id: { type: string }
                callbacks: { type: array, items: { type: object, additionalProperties: true } }
      responses:
        '200': { $ref: '#/components/responses/RuntimeResponse' }
  /v1/review-decisions:
    post:
      operationId: runtimeResumeUserDecision
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [thread_id, decision]
              properties:
                thread_id: { type: string }
                decision: { type: object, additionalProperties: true }
      responses:
        '200': { $ref: '#/components/responses/RuntimeResponse' }
  /v1/gates/finalize:
    post:
      operationId: runtimeFinalizeStageGate
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [thread_id, user_confirmed, action]
              properties:
                thread_id: { type: string }
                user_confirmed: { type: boolean }
                action: { type: string, enum: [approve, conditional_pass, revise, defer, reject] }
                decision: { type: object, additionalProperties: true }
      responses:
        '200': { $ref: '#/components/responses/RuntimeResponse' }
  /v1/exports/obsidian:
    post:
      operationId: runtimeExportObsidian
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [project_id]
              properties:
                project_id: { type: string }
      responses:
        '200': { $ref: '#/components/responses/RuntimeResponse' }
components:
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: PCO_RUNTIME_TOKEN
  responses:
    RuntimeResponse:
      description: Runtime response
      content:
        application/json:
          schema:
            type: object
            additionalProperties: true
